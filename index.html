<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>のまちJAM 出店依頼メール作成ツール</title>
<style>
  :root{ --green:#2E7D4F; --green2:#5DA875; --line:#dce5df; --bg:#f4f7f5; --ink:#2f3a33; --muted:#5f6b62; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Yu Gothic","Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;
        color:var(--ink); background:var(--bg); line-height:1.6; }
  header{ background:var(--green); color:#fff; padding:16px 22px; }
  header h1{ margin:0; font-size:18px; }
  header p{ margin:4px 0 0; font-size:12.5px; opacity:.9; }
  .wrap{ display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px; max-width:1180px; margin:0 auto; }
  @media(max-width:820px){ .wrap{ grid-template-columns:1fr; } }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px 18px 20px; }
  h2{ font-size:14px; margin:0 0 12px; color:var(--green); border-bottom:2px solid var(--green2); padding-bottom:6px; }
  label{ display:block; font-size:12.5px; font-weight:bold; margin:12px 0 4px; }
  .hint{ font-weight:normal; color:var(--muted); font-size:11.5px; }
  input,select,textarea{ width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px;
        font-family:inherit; font-size:13.5px; color:var(--ink); background:#fff; }
  input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--green2); box-shadow:0 0 0 2px #5da8752e; }
  textarea{ resize:vertical; min-height:58px; }
  .row{ display:grid; grid-template-columns:1fr 90px; gap:8px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  fieldset{ border:1px dashed var(--line); border-radius:10px; padding:6px 12px 12px; margin:16px 0 0; }
  legend{ font-size:12px; color:var(--muted); padding:0 6px; }
  .preview-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
  .subject{ background:#f7faf8; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13.5px; font-weight:bold; }
  pre#body{ white-space:pre-wrap; word-break:break-word; background:#f7faf8; border:1px solid var(--line);
        border-radius:8px; padding:14px; font-family:inherit; font-size:13px; margin:0; }
  .btns{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  button{ cursor:pointer; border:none; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:bold;
        font-family:inherit; background:var(--green); color:#fff; }
  button.ghost{ background:#fff; color:var(--green); border:1.5px solid var(--green); }
  button:active{ transform:translateY(1px); }
  .mini{ padding:6px 10px; font-size:12px; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
        background:var(--ink); color:#fff; padding:10px 18px; border-radius:24px; font-size:13px;
        opacity:0; pointer-events:none; transition:.25s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .note{ font-size:11.5px; color:var(--muted); margin-top:10px; }
</style>
</head>
<body>
<header>
  <h1>のまちJAM 出店依頼メール作成ツール</h1>
  <p>宛先とジャンルを選ぶと、件名・本文が自動で出来上がります。［コピー］ボタンでそのまま貼り付けできます。</p>
</header>

<div class="wrap">
  <!-- INPUT -->
  <div class="card">
    <h2>① 宛先・内容を入力</h2>

    <label>ジャンル</label>
    <select id="genre">
      <option value="food">フード・キッチンカー</option>
      <option value="sweets">スイーツ・ドリンク</option>
      <option value="craft">ものづくり・体験</option>
      <option value="stage">ステージ出演</option>
      <option value="sponsor">協賛・ご協力</option>
      <option value="other">その他</option>
    </select>

    <div class="grid2">
      <div>
        <label>面識</label>
        <select id="relation">
          <option>はじめまして</option>
          <option>お世話になっております</option>
        </select>
      </div>
      <div>
        <label>返信期限 <span class="hint">(例: 7月20日)</span></label>
        <input id="deadline" placeholder="7月20日">
      </div>
    </div>

    <label>店舗・団体名</label>
    <input id="shop" placeholder="例）〇〇キッチン">

    <div class="row">
      <div>
        <label>ご担当者名</label>
        <input id="person" placeholder="例）山田 太郎">
      </div>
      <div>
        <label>敬称</label>
        <input id="honor" value="様">
      </div>
    </div>

    <label>お声がけ理由 <span class="hint">(ジャンルで自動入力。自由に編集OK)</span></label>
    <textarea id="reason"></textarea>

    <fieldset>
      <legend>差出人（ブラウザに保存され、次回も使えます）</legend>
      <label>担当者名 <span class="hint">(任意・空欄なら「のまちJAM実行委員会」名義)</span></label>
      <input id="sender" placeholder="空欄でOK">
      <label>返信先メール</label>
      <input id="email" value="nomachijam2026@gmail.com">
      <p class="hint" style="margin:9px 0 0;">署名の会場情報（金沢市の施設である旨・住所・地図・Webサイト・過去開催リンク）は自動で入ります。</p>
    </fieldset>

    <div class="btns">
      <button class="ghost mini" id="clearBtn">入力をクリア</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card">
    <div class="preview-head">
      <h2 style="border:none;margin:0;padding:0;">② できあがり（プレビュー）</h2>
      <button class="mini" id="copyAll">件名＋本文をコピー</button>
    </div>

    <label>件名 <button class="ghost mini" id="copySubject" style="float:right;padding:3px 10px;">コピー</button></label>
    <div class="subject" id="subject"></div>

    <label style="margin-top:14px;">本文 <button class="ghost mini" id="copyBody" style="float:right;padding:3px 10px;">コピー</button></label>
    <pre id="body"></pre>

    <p class="note">※ 今回の目的：出店可否の確認と日程確保のお願い。<br>
    ※ 企画概要書は7/9以降にお渡しできるため、このメールには添付しません（詳しい資料はその後ご案内）。</p>
  </div>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
const $ = id => document.getElementById(id);
const F = ['genre','relation','deadline','shop','person','honor','reason','sender','email'];
const SIG = ['sender','email']; // 記憶する項目

const reasons = {
  food:   '地域の皆さんに楽しんでいただけるお料理を、ぜひご一緒したいと思い',
  sweets: '来場者の皆さんに喜んでいただけるスイーツ・ドリンクを、ぜひご一緒したいと思い',
  craft:  '子どもも大人も楽しめるものづくり・体験を、ぜひご一緒したいと思い',
  stage:  '世代を超えて楽しめるステージを、一緒に盛り上げていただけたらと思い',
  sponsor:'地域のお祭りを一緒に支えてくださるパートナーを探しており',
  other:  ''
};
// モード別の文言
function modeOf(g){ return g==='stage' ? 'stage' : g==='sponsor' ? 'sponsor' : 'booth'; }
const M = {
  booth:  { invite:'ご出店', act:'出店', detail:'提供メニュー・搬入方法', subj:'出店のお声がけ／日程確保のお願い' },
  stage:  { invite:'ご出演', act:'出演', detail:'出演内容・機材・タイムテーブル', subj:'ステージ出演のお声がけ／日程確保のお願い' },
  sponsor:{ invite:'ご協賛', act:'協賛', detail:'協賛プラン・特典', subj:'協賛のお願い' }
};

function buildSubject(){
  return '【のまちJAM 2026】9/27（日）' + M[modeOf($('genre').value)].subj;
}

function buildBody(){
  const g = $('genre').value, mode = modeOf(g), m = M[mode];
  const feeLine = mode==='booth' ? '出店料はいただきません（無料）。' : '';
  const shop = $('shop').value.trim() || '〔店舗・団体名〕';
  const person = $('person').value.trim() || '〔ご担当者名〕';
  const honor = $('honor').value.trim() || '様';
  const rel = $('relation').value;
  const senderName = $('sender').value.trim();
  const nameSuffix = senderName ? 'の' + senderName : '';
  const reason = $('reason').value.trim() || '〔お声がけの理由を一言〕';
  const deadline = $('deadline').value.trim() || '〔返信期限〕';
  const email = $('email').value.trim() || 'nomachijam2026@gmail.com';

  // 依頼のお願い（モード別）
  let asks;
  if(mode==='sponsor'){
    asks = '　① 今年ののまちJAMへのご協賛について、ご検討いただくことは可能でしょうか。\n' +
           '　② 前向きにご検討いただける場合、開催日（9/27）を念頭に、お時間をいただけますでしょうか。';
  } else {
    asks = '　① 当日（9/27）の' + m.act + 'は可能でしょうか。\n' +
           '　② 前向きにご検討いただける場合、この日程を仮でお空けいただけますでしょうか。';
  }

  const sig = ['――――――――――――――――',
    'のまちJAM実行委員会',
    senderName || null,
    '会場：金沢未来のまち創造館（金沢市の複合施設）',
    '住所：〒921-8031 石川県金沢市野町3丁目11-1',
    '地図：https://www.google.com/maps/search/?api=1&query=金沢未来のまち創造館',
    'Webサイト：https://www.mirai-nomachi.jp/',
    'Mail：' + email,
    '――――――――――――――――'].filter(Boolean).join('\n');

  return [
`${shop}
${person}${honor}`,
`${rel}。金沢未来のまち創造館「のまちJAM」実行委員会${nameSuffix}と申します。
このたびは、${reason}、ぜひ今年ののまちJAMに${m.invite}いただきたくご連絡いたしました。`,
`のまちJAMは、金沢市の複合施設「金沢未来のまち創造館」が、旧野町小学校のグラウンドで2022年から毎年開催している地域のお祭りです。「ともに奏で、ともに灯し、ともにつくる」を合言葉に、子どもから大人まで多くの方でにぎわい、昨年は約2,000人にご来場いただきました。
昨年（2025年）ののまちJAMの様子は、こちらのサイトでご覧いただけます。
▶ https://nomachi-jam-2025.studio.site/`,
`■ 開催概要
・名称：のまちJAM 2026
・日時：2026年9月27日（日）10:30〜18:00
・会場：旧野町小学校グラウンド（金沢未来のまち創造館）
・主催：金沢未来のまち創造館 ／ 運営：のまちJAM実行委員会`,
`つきましては、まずは以下2点についてお伺いできればと存じます。

${asks}`,
`${feeLine}企画の概要をまとめた「企画概要書」は7月9日にお渡しできる予定です。${m.detail}などの詳しい資料は、その後あらためてご案内いたします。本メールは、まずは${m.act}の可否と日程確保のご相談を目的としたものですので、現時点で詳細が固まっていなくても問題ございません。`,
`お手数ですが、${deadline}までに本メールへご返信いただけますと幸いです。ご不明な点がございましたら、お気軽にお問い合わせください。何卒よろしくお願いいたします。`,
sig
  ].join('\n\n');
}

function render(){
  $('subject').textContent = buildSubject();
  $('body').textContent = buildBody();
  // 署名を保存
  const sig = {}; SIG.forEach(k=> sig[k]=$(k).value); localStorage.setItem('njmail_sig', JSON.stringify(sig));
}

function onGenreChange(){
  // 理由を自動入力（ユーザーが手入力済みなら上書きしない）
  const auto = reasons[$('genre').value] || '';
  if(!$('reason').dataset.touched){ $('reason').value = auto; }
  render();
}

// イベント
F.forEach(k=> $(k).addEventListener('input', render));
$('genre').addEventListener('change', onGenreChange);
$('reason').addEventListener('input', ()=> $('reason').dataset.touched='1');

function toast(){ const t=$('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1300); }
function copy(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(toast, fallback);
  } else fallback();
  function fallback(){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); toast(); }
}
$('copySubject').onclick = ()=> copy($('subject').textContent);
$('copyBody').onclick = ()=> copy($('body').textContent);
$('copyAll').onclick = ()=> copy('件名：'+$('subject').textContent+'\n\n'+$('body').textContent);
$('clearBtn').onclick = ()=>{ ['deadline','shop','person','reason'].forEach(k=>$(k).value=''); $('reason').dataset.touched=''; onGenreChange(); };

// 署名を復元
try{ const s=JSON.parse(localStorage.getItem('njmail_sig')||'{}'); SIG.forEach(k=>{ if(s[k]) $(k).value=s[k]; }); }catch(e){}
// 初期化
onGenreChange();
</script>
</body>
</html>
